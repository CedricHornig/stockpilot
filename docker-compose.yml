services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stockpilot-db
    environment:
      SA_PASSWORD: "StockPilot_Dev123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: src/StockPilot.API/Dockerfile
    container_name: stockpilot-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=StockPilot;User Id=sa;Password=StockPilot_Dev123!;TrustServerCertificate=True
    depends_on:
      - db

volumes:
  sqldata:
